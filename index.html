<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Control de Importaciones - Comex</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f6f9;
        }

        h1 {
            text-align: center;
            color: #1f4e78;
        }

        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* ESTRUCTURA DE BLOQUES FLOTANTES DE LA CLASE */
        .box-col {
            width: 46%;
            float: left;
            margin: 2%;
            border: 2px solid #bdc3c7;
            padding: 15px;
            box-sizing: border-box;
            background-color: #fff;
            border-radius: 6px;
            min-height: 240px;
        }

        .box-col h2 {
            margin-top: 0;
            font-size: 16px;
            color: #2e74b5;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }

        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #34495e;
        }

        .form-group input {
            width: 100%;
            padding: 6px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .clearfix {
            clear: both;
        }

        /* BOTONERA CENTRAL INTERACTIVA */
        .botonera {
            margin: 20px 2%;
            text-align: center;
        }

        .botonera button {
            padding: 10px 18px;
            font-size: 13px;
            font-weight: bold;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
            min-width: 180px;
        }

        .btn-blue { background-color: #2980b9; }
        .btn-green { background-color: #27ae60; }
        .btn-orange { background-color: #e67e22; }
        .btn-red { background-color: #c0392b; }

        /* CONSOLA OSCURA INFERIOR PARA EVIDENCIAS */
        .consola-bloque {
            margin: 15px 2%;
            background-color: #2c3e50;
            color: #2ecc71;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            border-radius: 6px;
            min-height: 160px;
            max-height: 260px;
            overflow-y: auto;
            white-space: pre-line;
            border: 2px solid #34495e;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .warn-text { color: #f1c40f; }
        .error-text { color: #e74c3c; }
        .info-text { color: #5dade2; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚢 Sistema Control de Importaciones y Aduanas</h1>
        <p style="text-align: center; font-style: italic; color: #7f8c8d;">Panel de Auditoría de Carga e Internación - Duoc UC</p>

        <div class="box-col">
            <h2>📦 Registro de Contenedor (POO)</h2>
            <div class="form-group">
                <label>ID Registro Operación:</label>
                <input type="number" id="inputID" value="101">
            </div>
            <div class="form-group">
                <label>Número Documento BL (Bill of Lading):</label>
                <input type="text" id="inputBL" value="MEDU987654">
            </div>
            <div class="form-group">
                <label>Costo Flete de Internación (USD):</label>
                <input type="number" id="inputFlete" value="4500">
            </div>
        </div>

        <div class="box-col">
            <h2>🔍 Módulo de Auditoría y Filtros</h2>
            <div class="form-group">
                <label>Buscar por ID Operación:</label>
                <input type="number" id="inputBuscarID" value="101">
            </div>
            <div class="form-group">
                <label>Límite Crítico Flete Alerta (USD):</label>
                <input type="number" id="inputLimite" value="4000">
            </div>
            <div class="form-group">
                <label>Tiempo Espera Satelital (Segundos):</label>
                <input type="number" id="inputTiempo" value="2">
            </div>
        </div>

        <div class="clearfix"></div>

        <div class="botonera">
            <button class="btn-blue" onclick="registrarContenedor()">1. Registrar Contenedor</button>
            <button class="btn-green" onclick="buscarContenedorPorId()">2. Buscar por ID</button>
            <button class="btn-orange" onclick="auditarFletesHistoricos()">3. Auditar Fletes (For)</button>
            <button class="btn-red" onclick="ejecutarTrackingAsincrono()">4. Tracking Satelital (Async)</button>
        </div>

        <div class="consola-bloque" id="outputScreen">Consola en línea. Ingrese registros y presione un botón de operación...</div>
    </div>

    <script src="app.js"></script>
</body>
</html>
